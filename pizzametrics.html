<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaMetrics — Bonità Pizzaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--accent:#e84224;--accent2:#f97316;--gold:#eab308;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--blue:#3b82f6;--bg:#0f0f0f;--surface:#161616;--surface2:#1c1c1c;--border:#252525;--text:#e8e8e8;--muted:#666;--mono:'IBM Plex Mono',monospace;--sans:'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--text);background:var(--bg);font-size:14px;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.2rem;background:var(--surface);border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:50}
.logo{font-size:20px;font-weight:600}.logo span{color:var(--accent)}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:1px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;font-family:var(--mono)}
.bd{border-color:var(--warn);color:var(--warn)}.bl{border-color:var(--ok);color:var(--ok)}.be{border-color:var(--bad);color:var(--bad)}.bk{border-color:var(--blue);color:var(--blue)}
.cbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.8rem 1.2rem;display:flex;flex-direction:column;gap:.6rem}
.ctitle{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.crow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.crow label{font-size:11px;color:var(--muted);min-width:52px;white-space:nowrap}
.inp{flex:1;min-width:120px;font-size:12px;font-family:var(--mono);height:32px;padding:0 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.btn{height:32px;padding:0 14px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btp{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}.btp:hover{background:#c73b1f;border-color:#c73b1f;color:#fff}
.info{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.5rem .8rem;font-size:12px;color:var(--muted);line-height:1.7;display:none}
.tabs{display:flex;gap:4px;padding:.7rem 1.2rem 0;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{height:32px;padding:0 14px;border-radius:4px 4px 0 0;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:-1px}
.tab.a{background:var(--bg);border-color:var(--border);color:var(--text)}
main{padding:1rem 1.2rem}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1rem}
.kc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem;position:relative;border-top:2px solid transparent}
.kc.r{border-top-color:var(--accent)}.kc.o{border-top-color:var(--accent2)}.kc.g2{border-top-color:var(--gold)}.kc.gn{border-top-color:var(--ok)}.kc.b{border-top-color:var(--blue)}
.kl{font-size:11px;color:var(--muted);margin-bottom:5px}.kv{font-size:28px;font-weight:500;line-height:1}.ku{font-size:10px;color:var(--muted);margin-top:3px}
.kt{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 7px;border-radius:10px}
.tok{background:rgba(34,197,94,.1);color:var(--ok)}.tov{background:rgba(239,68,68,.1);color:var(--bad)}.tn{background:var(--surface2);color:var(--muted)}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem;margin-bottom:1rem}
.sctitle{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.sr{display:flex;align-items:center;gap:10px;margin-bottom:8px}.sr:last-child{margin-bottom:0}
.sl{font-size:12px;min-width:160px}.stk{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.sf{height:100%;border-radius:3px;transition:width .8s ease}.sp{font-size:12px;font-family:var(--mono);min-width:42px;text-align:right}
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:1rem}
.wc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.6rem .4rem;text-align:center}
.wn{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}.wn.td{color:var(--accent)}
.wv{font-size:15px;font-weight:500;margin-bottom:2px}.wb{height:3px;border-radius:2px;margin:3px auto 4px}.wct{font-size:10px;color:var(--muted)}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem}.cc.fw{grid-column:1/-1}
.ct{font-size:13px;font-weight:600;margin-bottom:2px}.cs{font-size:11px;color:var(--muted);margin-bottom:10px}
.dtb{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.dtb button{height:26px;padding:0 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s}
.dtb button.a{background:var(--accent);border-color:var(--accent);color:#fff}
.dtb button:hover:not(.a){border-color:var(--accent);color:var(--accent)}
.hmh{font-size:9px;color:var(--muted);text-align:center;font-family:var(--mono)}
.hmr{font-size:9px;color:var(--muted);display:flex;align-items:center;padding-right:4px;white-space:nowrap}
.hmc{height:20px;border-radius:2px}
/* TABELA */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem;margin-bottom:1rem}
.tbl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;gap:8px}
.tbl-search{height:30px;padding:0 10px;font-size:12px;font-family:var(--mono);background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);outline:none;width:200px}
.tbl-search:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)}
thead tr{border-bottom:1px solid var(--border)}
th{text-align:left;padding:.5rem .7rem;font-size:10px;letter-spacing:1px;color:var(--muted);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--accent)}
td{padding:.45rem .7rem;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text)}
tr:hover td{background:var(--surface2)}
.pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;letter-spacing:.5px}
.p-ok{background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.p-warn{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.p-bad{background:rgba(239,68,68,.1);color:var(--bad);border:1px solid rgba(239,68,68,.2)}
.tbl-foot{font-size:11px;color:var(--muted);margin-top:.6rem;text-align:right}
/* BAR inline */
.t-bar{display:inline-block;height:4px;border-radius:2px;vertical-align:middle;margin-left:4px}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.stmsg{text-align:center;padding:3rem;font-size:13px;color:var(--muted)}
footer{border-top:1px solid var(--border);padding:.8rem 1.2rem;display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-family:var(--mono)}
@media(max-width:700px){.cg{grid-template-columns:1fr}.wg{grid-template-columns:repeat(4,1fr)}.krow{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Pizza<span>Metrics</span></div>
    <div class="logo-sub">BONITÀ PIZZARIA · ANÁLISE DE TEMPOS</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="clk" style="font-size:12px;font-family:var(--mono);color:var(--muted)"></span>
    <span id="badge" class="badge bd">● DEMO</span>
  </div>
</header>

<div class="cbar">
  <div class="ctitle">configuração da conexão</div>
  <div class="crow">
    <label>proxy url</label>
    <input class="inp" type="text" id="gs-url"
      value="https://script.google.com/macros/s/AKfycbxG901rjjQiN50YDNWmScqH2hshcsKgLO8LgqyD08yvwURlrkDO3fW0v1HIeVC0bnoKlw/exec"
      style="max-width:600px">
  </div>
  <div class="crow">
    <label>token</label>
    <input class="inp" type="password" id="tk"
      value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJrZXkiOiI2YWE1MmQ2OC0zZWZiLTZlZWYtODYyOS00ZTNmMWU2MDJmNTgiLCJpYXQiOjE3NzkyODY2Nzh9.1XkX4VYKQT15YgNbbuTx-0q-PdaFLAz_I7ggPUmyjCI">
    <label style="min-width:56px">loja id</label>
    <input class="inp" type="text" id="sid" value="76472" style="max-width:100px;flex:none">
    <select class="inp" id="sel-days" style="max-width:180px;flex:none">
      <option value="7">últimos 7 dias</option>
      <option value="14" selected>últimos 14 dias</option>

    <button class="btn btp" onclick="conectar()">▶ CONECTAR</button>

</div>

<div class="tabs" id="ptabs">
  <button class="tab a" data-p="all">tudo</button>

  <button class="tab" data-p="week">semana</button>
  <button class="tab" data-p="month">mês</button>
</div>

<main id="mc"></main>

<footer>
  <span>PizzaMetrics · Bonità Pizzaria · loja 76472</span>
  <span id="last-sync">—</span>
</footer>

<script>
// ═══════════════════════════════════════════════
//  CONFIGURAÇÃO — edite apenas aqui se necessário
// ═══════════════════════════════════════════════
const CONFIG = {
  gsUrl: 'https://script.google.com/macros/s/AKfycbxG901rjjQiN50YDNWmScqH2hshcsKgLO8LgqyD08yvwURlrkDO3fW0v1HIeVC0bnoKlw/exec',
  token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJrZXkiOiI2YWE1MmQ2OC0zZWZiLTZlZWYtODYyOS00ZTNmMWU2MDJmNTgiLCJpYXQiOjE3NzkyODY2Nzh9.1XkX4VYKQT15YgNbbuTx-0q-PdaFLAz_I7ggPUmyjCI',
  storeId: '76472',
  metaCozinha: 20,
  metaEntrega: 15,
  metaTotal:   35
};

const DAYS_PT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DAYS_FULL=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
let S={orders:[],period:'all',cmpDay:1,charts:{},live:false,sortCol:'total',sortAsc:false,tableData:[]};

// Pré-preenche campos com CONFIG
document.getElementById('gs-url').value = CONFIG.gsUrl;
document.getElementById('tk').value     = CONFIG.token;
document.getElementById('sid').value    = CONFIG.storeId;

setInterval(()=>{document.getElementById('clk').textContent=new Date().toLocaleTimeString('pt-BR');},1000);
document.getElementById('ptabs').addEventListener('click',e=>{
  const b=e.target.closest('.tab');if(!b)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('a'));b.classList.add('a');
  S.period=b.dataset.p;render();
});

const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const med=a=>{if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;};
const pct=(a,p)=>{if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y);return s[Math.max(0,Math.ceil(p/100*s.length)-1)];};
function gauss(m,sd){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return m+sd*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

function loadDemo(){
  const orders=[],ch=['iFood','WhatsApp','App','Telefone'];
  const now=new Date();
  for(let d=27;d>=0;d--){
    const date=new Date(now);date.setDate(now.getDate()-d);
    const wd=date.getDay(),load=(wd>=5?35:wd===0?28:18);
    for(let h=10;h<=23;h++){
      const n=Math.round(load*.12*(.6+Math.random()*.8));
      for(let i=0;i<n;i++){
        const pk=(h>=19&&h<=21)?4:0,we=(wd>=5?3:0);
        const cz=Math.max(8,Math.round(gauss(18+pk,4)));
        const en=Math.max(8,Math.round(gauss(18+pk+we,5)));
        const tot=cz+en;
        const t=new Date(date);t.setHours(h,Math.floor(Math.random()*60),0,0);
        orders.push({id:`D-${orders.length+1}`,orderTime:t,weekday:t.getDay(),hour:h,cozinha:cz,entrega:en,total:tot,channel:ch[Math.floor(Math.random()*4)],valor:Math.round(gauss(65,20)),status:tot<=30?'excelente':tot<=45?'ok':'crítico'});
      }
    }
  }
  S.orders=orders;S.live=false;
  setBadge('d');showInfo('');
  document.getElementById('fstatus').textContent=`${orders.length} pedidos (demo)`;
  document.getElementById('last-sync').textContent='Modo demonstração';
  render();
}

function mapOrder(r){
  try{
    if(r.canceled==='Y'||r.canceled===true)return null;
    const created=new Date(r.created_at);
    if(isNaN(created))return null;
    const en=parseFloat(r.delivery?.delivery_time||0);
    let cz=0;
    if(r.notes){
      const match=r.notes.match(/Entrega para às (\d{2}):(\d{2}):(\d{2})/i)||r.notes.match(/Entrega para (\d{2}):(\d{2})/i);
      if(match){
        const tProm=new Date(created);
        tProm.setHours(parseInt(match[1]),parseInt(match[2]),parseInt(match[3]||0),0);
        if(tProm<created)tProm.setDate(tProm.getDate()+1);
        const totalProm=Math.round((tProm-created)/60000);
        cz=Math.max(5,totalProm-Math.max(en,15));
      }
    }
    const tot=cz+en>0?cz+en:Math.max(20,en+15);
    if(!cz)cz=Math.round(tot*0.55);
    const finalEn=Math.max(0,tot-cz);
    let channel='Próprio';
    if(r.partner_sale?.partner_name)channel=r.partner_sale.partner_name;
    else if(r.id_sale_type===2)channel='Delivery';
    else if(r.id_sale_type===1)channel='Balcão';
    else if(r.id_sale_type===3)channel='Mesa';
    return{
      id:`#${r.sale_number||r.id_sale}`,
      orderTime:created,weekday:created.getDay(),hour:created.getHours(),
      cozinha:Math.max(1,Math.round(cz)),entrega:Math.max(0,Math.round(finalEn)),total:Math.max(5,Math.round(tot)),
      channel,valor:parseFloat(r.total_amount||0),
      status:tot<=30?'excelente':tot<=45?'ok':'crítico'
    };
  }catch(e){return null;}
}

async function conectar(){
  const gsUrl=document.getElementById('gs-url').value.trim();
  const token=document.getElementById('tk').value.trim().replace(/^Bearer\s+/i,'');
  const days=parseInt(document.getElementById('sel-days').value);
  if(!gsUrl){alert('URL do proxy não preenchida');return;}
  if(!token){alert('Token não preenchido');return;}
  setBadge('k');showInfo('<span class="spin"></span> buscando dados da Saipos…');
  document.getElementById('fstatus').textContent='buscando…';
  try{
    const allOrders=[],now=new Date(),windows=[];
    for(let i=0;i<days;i+=14){
      const end=new Date(now);end.setDate(now.getDate()-i);
      const start=new Date(now);start.setDate(now.getDate()-Math.min(i+14,days));
      windows.push({start,end});
    }
    for(let w=0;w<windows.length;w++){
      const {start,end}=windows[w];
      const fmt=d=>d.toISOString().slice(0,19);
      const params=new URLSearchParams({token,col:'created_at',start:fmt(start),end:fmt(end),limit:1000});
      document.getElementById('fstatus').textContent=`janela ${w+1}/${windows.length}…`;
      const resp=await fetch(`${gsUrl}?${params}`);
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
      const json=await resp.json();
      let raw=[];
      if(Array.isArray(json))raw=json;
      else{
        const arrKey=Object.keys(json).find(k=>Array.isArray(json[k])&&json[k].length>0&&json[k][0]?.id_sale);
        if(arrKey)raw=json[arrKey];
        else if(json.error)throw new Error(`Saipos: ${json.error}`);
      }
      raw.forEach(r=>{const o=mapOrder(r);if(o)allOrders.push(o);});
    }
    if(!allOrders.length)throw new Error('Nenhum pedido de entrega encontrado no período.');
    S.orders=allOrders;S.live=true;
    setBadge('l');
    showInfo(`<strong style="color:var(--ok)">✓ conectado!</strong> ${allOrders.length} pedidos carregados.`);
    document.getElementById('fstatus').textContent=`${allOrders.length} pedidos`;
    document.getElementById('last-sync').textContent='Último sync: '+new Date().toLocaleString('pt-BR');
    render();
  }catch(err){
    console.error(err);setBadge('e');
    showInfo(`<strong style="color:var(--bad)">Erro:</strong> ${err.message}`);
    document.getElementById('fstatus').textContent='erro';
  }
}

function filterByPeriod(orders){
  const now=new Date(),today=new Date(now);today.setHours(0,0,0,0);
  const wk=new Date(today);wk.setDate(today.getDate()-today.getDay());
  const mo=new Date(now.getFullYear(),now.getMonth(),1);
  if(S.period==='today')return orders.filter(o=>o.orderTime>=today);
  if(S.period==='week')return orders.filter(o=>o.orderTime>=wk);
  if(S.period==='month')return orders.filter(o=>o.orderTime>=mo);
  return orders;
}

function setBadge(t){const el=document.getElementById('badge');const m={d:['● DEMO','badge bd'],l:['● LIVE','badge bl'],e:['● ERRO','badge be'],k:['BUSCANDO…','badge bk']};el.textContent=m[t][0];el.className=m[t][1];}
function showInfo(html){const el=document.getElementById('info');if(!html){el.style.display='none';return;}el.innerHTML=html;el.style.display='block';}
function dChart(id){if(S.charts[id]){S.charts[id].destroy();delete S.charts[id];}}
function cOpts(yL='min'){
  const gc='rgba(255,255,255,.04)',tc='#555';
  return{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{size:10},boxWidth:10,padding:10}},tooltip:{backgroundColor:'#161616',borderColor:'#303030',borderWidth:1,titleColor:'#e8e8e8',bodyColor:tc}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{title:{display:!!yL,text:yL,color:tc,font:{size:10}},ticks:{color:tc,font:{size:10}},grid:{color:gc}}}};
}

// ── RENDER PRINCIPAL ──────────────────────────────────────
function render(){
  const filtered=filterByPeriod(S.orders);
  const el=document.getElementById('mc');
  if(!filtered.length){el.innerHTML='<div class="stmsg">nenhum pedido no período</div>';return;}

  const cz=filtered.map(o=>o.cozinha),en=filtered.map(o=>o.entrega),to=filtered.map(o=>o.total);
  const aC=avg(cz),aE=avg(en),aT=avg(to);
  const s30=filtered.filter(o=>o.total<=30).length/filtered.length*100;
  const s45=filtered.filter(o=>o.total>30&&o.total<=45).length/filtered.length*100;
  const sBad=filtered.filter(o=>o.total>45).length/filtered.length*100;
  const dtag=(v,tgt)=>{const d=v-tgt;if(Math.abs(d)<.5)return`<span class="kt tn">≈ meta</span>`;if(d>0)return`<span class="kt tov">+${d.toFixed(1)}</span>`;return`<span class="kt tok">${d.toFixed(1)}</span>`;};

  el.innerHTML=`
  <div class="krow">
    <div class="kc r">${dtag(aC,CONFIG.metaCozinha)}<div class="kl">COZINHA (MÉDIA)</div><div class="kv" style="color:var(--accent)">${aC.toFixed(1)}</div><div class="ku">min · meta ${CONFIG.metaCozinha}min</div></div>
    <div class="kc o">${dtag(aE,CONFIG.metaEntrega)}<div class="kl">ENTREGA (MÉDIA)</div><div class="kv" style="color:var(--accent2)">${aE.toFixed(1)}</div><div class="ku">min · meta ${CONFIG.metaEntrega}min</div></div>
    <div class="kc g2">${dtag(aT,CONFIG.metaTotal)}<div class="kl">TOTAL (MÉDIA)</div><div class="kv" style="color:var(--gold)">${aT.toFixed(1)}</div><div class="ku">min · meta ${CONFIG.metaTotal}min</div></div>
    <div class="kc gn"><div class="kl">PEDIDOS</div><div class="kv" style="color:var(--ok)">${filtered.length}</div><div class="ku">no período</div></div>
    <div class="kc b"><div class="kl">SLA ≤ 45MIN</div><div class="kv" style="color:var(--blue)">${(s30+s45).toFixed(1)}%</div><div class="ku">dentro do prazo</div></div>
  </div>
  <div class="sc">
    <div class="sctitle">breakdown sla</div>
    <div class="sr"><div class="sl">≤ 30min — excelente</div><div class="stk"><div class="sf" style="background:var(--ok);width:${s30.toFixed(1)}%"></div></div><div class="sp" style="color:var(--ok)">${s30.toFixed(1)}%</div></div>
    <div class="sr"><div class="sl">31–45min — ok</div><div class="stk"><div class="sf" style="background:var(--warn);width:${s45.toFixed(1)}%"></div></div><div class="sp" style="color:var(--warn)">${s45.toFixed(1)}%</div></div>
    <div class="sr"><div class="sl">> 45min — crítico</div><div class="stk"><div class="sf" style="background:var(--bad);width:${sBad.toFixed(1)}%"></div></div><div class="sp" style="color:var(--bad)">${sBad.toFixed(1)}%</div></div>
  </div>
  <div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">média por dia da semana</div>
  <div class="wg" id="wg"></div>
  <div class="cg">
    <div class="cc"><div class="ct">Evolução Diária</div><div class="cs">média cozinha · entrega · total por dia</div><div style="position:relative;height:220px"><canvas id="c-daily"></canvas></div></div>
    <div class="cc"><div class="ct">Distribuição · Tempo Total</div><div class="cs">frequência por faixa de minutos</div><div style="position:relative;height:220px"><canvas id="c-hist"></canvas></div></div>
  </div>
  <div class="cg">
    <div class="cc fw">
      <div class="ct">Comparativo Mesmo Dia — 4 Semanas</div>
      <div class="dtb" id="dtb">${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map((d,i)=>`<button data-wd="${[1,2,3,4,5,6,0][i]}" class="${S.cmpDay===[1,2,3,4,5,6,0][i]?'a':''}">${d}</button>`).join('')}</div>
      <div id="csub" class="cs"></div>
      <div style="position:relative;height:190px"><canvas id="c-cmp"></canvas></div>
    </div>
  </div>
  <div class="cg">
    <div class="cc"><div class="ct">Percentis por Dia</div><div class="cs">p25 · mediana · p75 do tempo total</div><div style="position:relative;height:220px"><canvas id="c-pct"></canvas></div></div>
    <div class="cc"><div class="ct">Mapa de Calor</div><div class="cs">tempo total médio · hora × dia</div><div id="hm" style="margin-top:6px;overflow-x:auto"></div></div>
  </div>

  <!-- TABELA DE PEDIDOS -->
  <div class="tbl-wrap">
    <div class="tbl-header">
      <div>
        <div class="ct">Pedidos — do mais demorado ao mais rápido</div>
        <div class="cs">clique no cabeçalho para reordenar · <span id="tbl-count"></span></div>
      </div>
      <input class="tbl-search" id="tbl-search" placeholder="buscar pedido, canal…" oninput="filterTable(this.value)">
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable('id')">PEDIDO</th>
            <th onclick="sortTable('orderTime')">DATA/HORA</th>
            <th onclick="sortTable('cozinha')">🍕 COZINHA</th>
            <th onclick="sortTable('entrega')">🛵 ENTREGA</th>
            <th onclick="sortTable('total')">⏱ TOTAL ↓</th>
            <th onclick="sortTable('channel')">CANAL</th>
            <th onclick="sortTable('status')">STATUS</th>
            <th onclick="sortTable('valor')">VALOR</th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
    <div class="tbl-foot" id="tbl-foot"></div>
  </div>
  `;

  document.getElementById('dtb').addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    document.querySelectorAll('#dtb button').forEach(t=>t.classList.remove('a'));b.classList.add('a');
    S.cmpDay=parseInt(b.dataset.wd);renderCmp();
  });

  renderWd(filtered);renderDaily(filtered);renderHist(filtered);renderCmp();renderPct(filtered);renderHeatmap(filtered);

  // Tabela: ordena por total decrescente por padrão
  S.tableData=[...filtered].sort((a,b)=>b.total-a.total);
  S.sortCol='total';S.sortAsc=false;
  drawTable(S.tableData);
}

// ── TABELA ────────────────────────────────────────────────
function drawTable(data){
  const maxTotal=Math.max(...data.map(o=>o.total),1);
  const rows=data.slice(0,500).map((o,i)=>{
    const pill=o.status==='excelente'?'p-ok':o.status==='ok'?'p-warn':'p-bad';
    const barW=Math.round(o.total/maxTotal*80);
    const barCol=o.total<=30?'var(--ok)':o.total<=45?'var(--warn)':'var(--bad)';
    return`<tr>
      <td style="color:var(--muted)">${o.id}</td>
      <td>${o.orderTime.toLocaleDateString('pt-BR')} ${o.orderTime.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</td>
      <td style="color:var(--accent)">${o.cozinha}min</td>
      <td style="color:var(--accent2)">${o.entrega}min</td>
      <td><strong style="color:${barCol}">${o.total}min</strong><span class="t-bar" style="width:${barW}px;background:${barCol};opacity:.4"></span></td>
      <td style="color:var(--muted)">${o.channel}</td>
      <td><span class="pill ${pill}">${o.status}</span></td>
      <td style="color:var(--muted)">R$ ${o.valor.toFixed(2)}</td>
    </tr>`;
  }).join('');
  const body=document.getElementById('tbl-body');if(body)body.innerHTML=rows;
  const cnt=document.getElementById('tbl-count');if(cnt)cnt.textContent=`${data.length} pedidos`;
  const foot=document.getElementById('tbl-foot');if(foot)foot.textContent=data.length>500?`Exibindo 500 de ${data.length} pedidos`:`${data.length} pedidos`;
}

function filterTable(q){
  const lq=q.toLowerCase();
  const filtered=S.tableData.filter(o=>
    o.id.toLowerCase().includes(lq)||
    o.channel.toLowerCase().includes(lq)||
    o.status.includes(lq)
  );
  drawTable(filtered);
}

function sortTable(col){
  if(S.sortCol===col)S.sortAsc=!S.sortAsc;
  else{S.sortCol=col;S.sortAsc=col==='id'||col==='orderTime'||col==='channel';}
  S.tableData.sort((a,b)=>{
    let av=a[col],bv=b[col];
    if(col==='orderTime'){av=av.getTime();bv=bv.getTime();}
    if(typeof av==='number')return S.sortAsc?av-bv:bv-av;
    return S.sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
  });
  drawTable(S.tableData);
}

// ── GRÁFICOS ──────────────────────────────────────────────
function renderWd(orders){
  const byDay={};for(let d=0;d<7;d++)byDay[d]=[];
  orders.forEach(o=>byDay[o.weekday].push(o.total));
  const tdWd=new Date().getDay(),mxA=Math.max(...Object.values(byDay).map(a=>avg(a)||0))||1;
  document.getElementById('wg').innerHTML=DAYS_PT.map((d,i)=>{
    const a=byDay[i],av=avg(a);
    const col=av<=30?'var(--ok)':av<=45?'var(--warn)':'var(--bad)';
    return`<div class="wc"><div class="wn ${i===tdWd?'td':''}">${d}</div><div class="wv" style="color:${col}">${av?av.toFixed(1)+'m':'—'}</div><div class="wb" style="background:${col};width:${Math.round(av/mxA*80)}%;min-width:3px"></div><div class="wct">${a.length}p</div></div>`;
  }).join('');
}
function renderDaily(orders){
  const bd={};
  orders.forEach(o=>{const k=o.orderTime.toLocaleDateString('pt-BR');if(!bd[k])bd[k]={cz:[],en:[],to:[]};bd[k].cz.push(o.cozinha);bd[k].en.push(o.entrega);bd[k].to.push(o.total);});
  const lb=Object.keys(bd).slice(-14);
  dChart('c-daily');const ctx=document.getElementById('c-daily');if(!ctx)return;
  S.charts['c-daily']=new Chart(ctx,{type:'line',data:{labels:lb,datasets:[
    {label:'cozinha',data:lb.map(k=>+avg(bd[k].cz).toFixed(1)),borderColor:'#e84224',backgroundColor:'rgba(232,66,36,.07)',tension:.4,pointRadius:2},
    {label:'entrega',data:lb.map(k=>+avg(bd[k].en).toFixed(1)),borderColor:'#f97316',backgroundColor:'rgba(249,115,22,.07)',tension:.4,pointRadius:2},
    {label:'total',data:lb.map(k=>+avg(bd[k].to).toFixed(1)),borderColor:'#eab308',backgroundColor:'rgba(234,179,8,.08)',tension:.4,pointRadius:2,borderWidth:2},
    {label:'meta',data:lb.map(()=>CONFIG.metaTotal),borderColor:'rgba(239,68,68,.35)',borderDash:[6,4],pointRadius:0,borderWidth:1}
  ]},options:cOpts('minutos')});
}
function renderHist(orders){
  const bins=[],lb=[];
  for(let i=10;i<=65;i+=5){lb.push(`${i}-${i+4}`);bins.push(orders.filter(o=>o.total>=i&&o.total<i+5).length);}
  const cols=lb.map((_,i)=>{const v=10+i*5;return v<=30?'rgba(34,197,94,.75)':v<=45?'rgba(245,158,11,.75)':'rgba(239,68,68,.75)';});
  dChart('c-hist');const ctx=document.getElementById('c-hist');if(!ctx)return;
  S.charts['c-hist']=new Chart(ctx,{type:'bar',data:{labels:lb,datasets:[{label:'pedidos',data:bins,backgroundColor:cols,borderRadius:2}]},options:{...cOpts('pedidos'),plugins:{...cOpts().plugins,legend:{display:false}}}});
}
function renderCmp(){
  const d=S.cmpDay,now=new Date(),cols=['#e84224','#f97316','#eab308','#3b82f6'],ds=[];
  for(let w=0;w<4;w++){
    const tgt=new Date(now);tgt.setDate(now.getDate()-now.getDay()-w*7+d);tgt.setHours(0,0,0,0);
    const nxt=new Date(tgt);nxt.setDate(tgt.getDate()+1);
    const day=S.orders.filter(o=>o.orderTime>=tgt&&o.orderTime<nxt);
    const byH={};day.forEach(o=>{if(!byH[o.hour])byH[o.hour]=[];byH[o.hour].push(o.total);});
    ds.push({label:tgt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}),data:Array.from({length:14},(_,i)=>byH[i+10]?+avg(byH[i+10]).toFixed(1):null),borderColor:cols[w],backgroundColor:'transparent',tension:.4,pointRadius:2,spanGaps:true});
  }
  const sub=document.getElementById('csub');
  if(sub)sub.textContent=`${DAYS_FULL[d].toLowerCase()} × 4 semanas — tempo total médio por hora`;
  dChart('c-cmp');const ctx=document.getElementById('c-cmp');if(!ctx)return;
  S.charts['c-cmp']=new Chart(ctx,{type:'line',data:{labels:Array.from({length:14},(_,i)=>`${i+10}h`),datasets:ds},options:cOpts('min')});
}
function renderPct(orders){
  const byDay=DAYS_PT.map((_,i)=>orders.filter(o=>o.weekday===i).map(o=>o.total));
  dChart('c-pct');const ctx=document.getElementById('c-pct');if(!ctx)return;
  S.charts['c-pct']=new Chart(ctx,{type:'bar',data:{labels:DAYS_PT,datasets:[
    {label:'p25',data:byDay.map(a=>Math.round(pct(a,25))),backgroundColor:'rgba(59,130,246,.3)',stack:'s'},
    {label:'mediana',data:byDay.map(a=>Math.round(med(a))-Math.round(pct(a,25))),backgroundColor:'rgba(234,179,8,.75)',stack:'s'},
    {label:'p75',data:byDay.map(a=>Math.round(pct(a,75))-Math.round(med(a))),backgroundColor:'rgba(249,115,22,.4)',stack:'s'},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#555',font:{size:10},boxWidth:10}}},scales:{x:{stacked:true,ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{stacked:true,ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}}}}});
}
function renderHeatmap(orders){
  const mx={};DAYS_PT.forEach((_,di)=>{mx[di]={};for(let h=10;h<=23;h++)mx[di][h]=[];});
  orders.forEach(o=>{if(mx[o.weekday]&&o.hour>=10&&o.hour<=23)mx[o.weekday][o.hour].push(o.total);});
  let gm=0;Object.values(mx).forEach(row=>Object.values(row).forEach(a=>{const av=avg(a);if(av>gm)gm=av;}));
  const hrs=Array.from({length:14},(_,i)=>i+10);
  let h=`<div style="display:grid;grid-template-columns:auto repeat(14,1fr);gap:2px">`;
  h+=`<div></div>${hrs.map(hr=>`<div class="hmh">${hr}h</div>`).join('')}`;
  DAYS_PT.forEach((day,di)=>{
    h+=`<div class="hmr">${day}</div>`;
    hrs.forEach(hr=>{
      const vals=mx[di][hr],a=avg(vals);
      const p=gm?a/gm:0;
      const bg=!vals.length?'rgba(255,255,255,.03)':`rgb(${Math.round(50+p*200)},${Math.round(197-p*170)},${Math.round(94-p*80)})`;
      h+=`<div class="hmc" style="background:${bg}" title="${vals.length?`${day} ${hr}h — ${a.toFixed(1)}min (${vals.length}p)`:'sem dados'}"></div>`;
    });
  });
  h+='</div>';
  const el=document.getElementById('hm');if(el)el.innerHTML=h;
}

loadDemo();
</script>
